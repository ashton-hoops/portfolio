<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cover 10 · Full-bleed seated</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root { --bg: #fafaf6; --text: #18171a; --text-on-dark: #fafaf6; --text-on-dark-soft: #cfceca; --accent: #6b1018; --font-display: 'Source Serif 4', Georgia, serif; --font-sans: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ddd; font-family: var(--font-sans); color: var(--text); }
  body { display: flex; justify-content: center; padding: 40px 20px; }
  .page { width: 816px; height: 1056px; background: var(--bg); box-shadow: 0 10px 40px rgba(0,0,0,0.18); position: relative; overflow: hidden; }
  .photo { position: absolute; inset: 0; background-image: url('/pdf/images/ashton-seated.jpg'); background-size: cover; background-position: 50% 28%; }
  .grad-t { position: absolute; top: 0; left: 0; right: 0; height: 30%; background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0)); z-index: 1; }
  .grad-b { position: absolute; left: 0; right: 0; bottom: 0; height: 55%; background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.15) 30%, rgba(0,0,0,0.82) 100%); z-index: 1; }
  .header { position: absolute; top: 36px; left: 56px; right: 56px; display: flex; justify-content: space-between; align-items: center; z-index: 2; color: var(--text-on-dark); }
  .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; margin: 0; color: var(--text-on-dark); }
  .logo { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.03em; font-variation-settings: 'opsz' 32; color: var(--text-on-dark); }
  .bottom { position: absolute; left: 56px; right: 56px; bottom: 56px; z-index: 2; color: var(--text-on-dark); }
  .pill { display: inline-block; margin-bottom: 18px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-on-dark); background: var(--accent); padding: 5px 11px; border-radius: 999px; }
  .name { font-family: var(--font-display); font-size: 128px; font-weight: 600; line-height: 0.86; letter-spacing: -0.04em; margin: 0 0 18px; color: var(--text-on-dark); font-variation-settings: 'opsz' 60; }
  .role { font-family: var(--font-display); font-style: italic; font-size: 22px; font-weight: 500; line-height: 1.3; color: var(--text-on-dark-soft); margin: 0 0 18px; font-variation-settings: 'opsz' 32; }
  .info-row { display: flex; align-items: flex-start; gap: 20px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.4); flex-wrap: wrap; }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-on-dark-soft); }
  .info-value { font-size: 12.5px; color: var(--text-on-dark); line-height: 1.3; }
  .info-sep { color: rgba(255,255,255,0.3); }
  .meta { position: absolute; bottom: 24px; right: 56px; z-index: 2; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-on-dark-soft); }
</style>
</head>
<body>
  <div class="page">
    <div class="photo"></div>
    <div class="grad-t"></div>
    <div class="grad-b"></div>
    <div class="header"><p class="eyebrow">Norman, Oklahoma</p><span class="logo">AJ</span></div>
    <div class="bottom">
      <span class="pill">Seeking GA · 2026–27</span>
      <h1 class="name">Ashton<br/>Jantz</h1>
      <p class="role">Basketball Analytics &amp; Research</p>
      <div class="info-row">
        <div class="info-item"><span class="info-label">Email</span><span class="info-value">ashtonbjantz@icloud.com</span></div>
        <span class="info-sep">·</span>
        <div class="info-item"><span class="info-label">Phone</span><span class="info-value">(405) 696-9206</span></div>
        <span class="info-sep">·</span>
        <div class="info-item"><span class="info-label">School</span><span class="info-value">B.B.A. Sports Business · OU '26</span></div>
        <span class="info-sep">·</span>
        <div class="info-item"><span class="info-label">Playing</span><span class="info-value">OU WBB practice player, 2024–26</span></div>
      </div>
    </div>
    <span class="meta">Portfolio · 2026</span>
  </div>
</body>
</html>
