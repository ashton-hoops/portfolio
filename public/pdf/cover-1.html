<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cover A · Split column</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fafaf6;
    --bg-subtle: #f3f2ec;
    --bg-dark: #18171a;
    --text: #18171a;
    --text-secondary: #4a4a48;
    --text-muted: #7a7976;
    --text-on-dark: #fafaf6;
    --text-on-dark-soft: #cfceca;
    --accent: #6b1018;
    --border: #d8d6cf;
    --border-light: #e8e6df;
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ddd; }
  body {
    font-family: var(--font-sans);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .page {
    width: 816px;
    height: 1056px;
    background: var(--bg);
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 0.62fr;
  }

  /* LEFT — text */
  .left {
    padding: 48px 36px 40px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--text);
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin: 0;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variation-settings: 'opsz' 32;
  }

  .name-area {
    margin-top: 40px;
  }

  .name {
    font-family: var(--font-display);
    font-size: 122px;
    font-weight: 600;
    line-height: 0.86;
    letter-spacing: -0.04em;
    margin: 0;
    font-variation-settings: 'opsz' 60;
  }

  .role {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    font-style: italic;
    line-height: 1.3;
    color: var(--text);
    margin: 32px 0 0;
    letter-spacing: -0.005em;
    font-variation-settings: 'opsz' 32;
    max-width: 18ch;
  }

  .status-pill {
    align-self: flex-start;
    display: inline-block;
    margin-top: 18px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--bg);
    background: var(--accent);
    padding: 5px 11px;
    border-radius: 999px;
  }

  .left-bottom {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .contact {
    padding-top: 14px;
    border-top: 1px solid var(--text);
  }

  .contact-row {
    display: grid;
    grid-template-columns: 74px 1fr;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .contact-row:last-child { border-bottom: none; }

  .contact-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    padding-top: 2px;
  }

  .contact-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .footer-meta {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
  }

  /* RIGHT — photo */
  .right {
    position: relative;
    overflow: hidden;
    background: var(--bg-dark);
  }

  .photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 20%;
    display: block;
  }

  /* Subtle vertical accent at extreme right edge */
  .right::after {
    content: '';
    position: absolute;
    top: 56px;
    right: 28px;
    width: 3px;
    height: 64px;
    background: var(--accent);
  }
</style>
</head>
<body>
  <div class="page">
    <section class="left">
      <div>
        <div class="top-row">
          <p class="eyebrow">Norman, Oklahoma</p>
          <span class="logo">AJ</span>
        </div>
        <div class="name-area">
          <h1 class="name">Ashton<br/>Jantz</h1>
          <p class="role">Basketball<br/>Analytics &amp; Research</p>
          <span class="status-pill">Seeking GA · 2026–27</span>
        </div>
      </div>

      <div class="left-bottom">
        <div class="contact">
          <div class="contact-row">
            <span class="contact-label">Email</span>
            <span class="contact-value">ashtonbjantz@icloud.com</span>
          </div>
          <div class="contact-row">
            <span class="contact-label">Phone</span>
            <span class="contact-value">(405) 696-9206</span>
          </div>
          <div class="contact-row">
            <span class="contact-label">School</span>
            <span class="contact-value">B.B.A. Sports Business · OU '26</span>
          </div>
          <div class="contact-row">
            <span class="contact-label">Playing</span>
            <span class="contact-value">OU WBB practice player, 2024–26</span>
          </div>
        </div>
        <span class="footer-meta">Portfolio · 2026</span>
      </div>
    </section>

    <section class="right">
      <img class="photo" src="/pdf/images/ashton-seated.jpg" alt="Ashton Jantz" />
    </section>
  </div>
</body>
</html>
