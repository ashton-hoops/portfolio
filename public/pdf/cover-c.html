<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cover C · Photo-bottom</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fafaf6;
    --bg-subtle: #f3f2ec;
    --text: #18171a;
    --text-secondary: #4a4a48;
    --text-muted: #7a7976;
    --accent: #6b1018;
    --border: #d8d6cf;
    --border-light: #e8e6df;
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ddd; }
  body {
    font-family: var(--font-sans);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .page {
    width: 816px;
    height: 1056px;
    background: var(--bg);
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* TOP HALF — masthead */
  .masthead {
    padding: 44px 56px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--text);
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin: 0;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variation-settings: 'opsz' 32;
  }

  .name {
    font-family: var(--font-display);
    font-size: 152px;
    font-weight: 600;
    line-height: 0.86;
    letter-spacing: -0.04em;
    margin: 0;
    font-variation-settings: 'opsz' 60;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 28px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    align-items: start;
  }

  .meta-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meta-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-muted);
  }

  .meta-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .meta-role {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
    font-variation-settings: 'opsz' 24;
  }

  .status-pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--bg);
    background: var(--accent);
    padding: 5px 11px;
    border-radius: 999px;
    margin-top: 6px;
  }

  /* BOTTOM — photo strip */
  .photo-strip {
    position: relative;
    overflow: hidden;
    background: var(--bg-dark);
  }

  .photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 30%;
    display: block;
  }

  /* Footer page meta overlaid on the photo */
  .footer-meta {
    position: absolute;
    bottom: 22px;
    right: 56px;
    z-index: 2;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #fafaf6;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
  <div class="page">
    <header class="masthead">
      <div class="top-row">
        <p class="eyebrow">Norman, Oklahoma</p>
        <span class="logo">AJ</span>
      </div>

      <h1 class="name">Ashton Jantz</h1>

      <div class="meta-grid">
        <div class="meta-block">
          <span class="meta-label">Role</span>
          <p class="meta-role" style="margin:0">Basketball Analytics &amp; Research</p>
          <span class="status-pill">Seeking GA · 2026–27</span>
        </div>
        <div class="meta-block">
          <span class="meta-label">Contact</span>
          <span class="meta-value">ashtonbjantz@icloud.com</span>
          <span class="meta-value">(405) 696-9206</span>
        </div>
        <div class="meta-block">
          <span class="meta-label">Background</span>
          <span class="meta-value">B.B.A. Sports Business · OU '26</span>
          <span class="meta-value">OU WBB practice player, 2024–26</span>
        </div>
      </div>
    </header>

    <section class="photo-strip">
      <img class="photo" src="/pdf/images/ashton-brick.jpg" alt="Ashton Jantz" />
      <span class="footer-meta">Portfolio · 2026</span>
    </section>
  </div>
</body>
</html>
