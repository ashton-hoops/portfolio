<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cover 8 · Minimalist, tiny photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root { --bg: #fafaf6; --text: #18171a; --text-muted: #7a7976; --accent: #6b1018; --border: #d8d6cf; --border-light: #e8e6df; --font-display: 'Source Serif 4', Georgia, serif; --font-sans: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ddd; font-family: var(--font-sans); color: var(--text); }
  body { display: flex; justify-content: center; padding: 40px 20px; }
  .page { width: 816px; height: 1056px; background: var(--bg); box-shadow: 0 10px 40px rgba(0,0,0,0.18); position: relative; overflow: hidden; padding: 64px 72px 56px; display: grid; grid-template-rows: auto 1fr auto; gap: 48px; }
  .top { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 28px; padding-bottom: 18px; border-bottom: 1px solid var(--text); }
  .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin: 0; }
  .photo { width: 80px; height: 80px; object-fit: cover; object-position: 50% 18%; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.10); display: block; }
  .logo { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.03em; font-variation-settings: 'opsz' 32; }
  .middle { display: flex; flex-direction: column; justify-content: center; gap: 28px; }
  .name { font-family: var(--font-display); font-size: 196px; font-weight: 600; line-height: 0.84; letter-spacing: -0.05em; margin: 0; font-variation-settings: 'opsz' 60; }
  .role { font-family: var(--font-display); font-style: italic; font-size: 28px; font-weight: 500; line-height: 1.3; margin: 0; font-variation-settings: 'opsz' 32; max-width: 26ch; }
  .pill { align-self: flex-start; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--bg); background: var(--accent); padding: 6px 12px; border-radius: 999px; }
  .bottom { padding-top: 18px; border-top: 1px solid var(--text); display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; align-items: end; }
  .bot-item { display: flex; flex-direction: column; gap: 3px; }
  .bot-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); }
  .bot-value { font-size: 12.5px; line-height: 1.4; }
  .meta { position: absolute; bottom: 22px; right: 72px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="page">
    <div class="top">
      <p class="eyebrow">Norman, Oklahoma · Portfolio 2026</p>
      <img class="photo" src="/pdf/images/ashton-brick.jpg" alt="" />
      <span class="logo">AJ</span>
    </div>
    <div class="middle">
      <h1 class="name">Ashton<br/>Jantz</h1>
      <p class="role">Basketball Analytics &amp; Research</p>
      <span class="pill">Seeking GA · 2026–27</span>
    </div>
    <div class="bottom">
      <div class="bot-item"><span class="bot-label">Email</span><span class="bot-value">ashtonbjantz@icloud.com</span></div>
      <div class="bot-item"><span class="bot-label">Phone</span><span class="bot-value">(405) 696-9206</span></div>
      <div class="bot-item"><span class="bot-label">School</span><span class="bot-value">B.B.A. Sports Business · OU '26</span></div>
      <div class="bot-item"><span class="bot-label">Playing</span><span class="bot-value">OU WBB practice player, 2024–26</span></div>
    </div>
    <span class="meta">Portfolio · 2026</span>
  </div>
</body>
</html>
