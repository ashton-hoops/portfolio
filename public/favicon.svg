<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    @media (prefers-color-scheme: dark) {
      .ink { fill: #fafaf6 !important; stroke: #fafaf6 !important; }
      .halo { stroke: #18171a !important; }
    }
  </style>
  <!-- Basketball outline + interior seams -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#18171a" stroke-width="3"
          class="ink"/>
  <g fill="none" stroke="#18171a" stroke-width="3" stroke-linecap="round" class="ink">
    <path d="M5 32 H 59"/>
    <path d="M32 5 V 59"/>
    <path d="M13 13 Q 32 32 13 51"/>
    <path d="M51 13 Q 32 32 51 51"/>
  </g>
  <!-- AJ monogram with a narrow knockout halo so seams stay visible. -->
  <text x="32" y="42" text-anchor="middle"
        font-family="Georgia, 'Source Serif 4', serif"
        font-size="24" font-weight="700"
        fill="#18171a" stroke="#fafaf6" stroke-width="2"
        paint-order="stroke"
        class="ink halo">AJ</text>
</svg>
